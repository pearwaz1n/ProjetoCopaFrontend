<div class="container mt-4">

    <div class="row mb-4 align-items-end">
        <div class="col-md-8">
            <h2 class="fw-bold mb-0">Calendário de Jogos</h2>
            <p class="text-muted">Acompanhe as partidas oficiais da Fase de Grupos</p>
        </div>

        <div class="col-md-4 d-flex justify-content-end">
            <div class="card shadow-sm px-5 py-3 text-center border-0" style="border-radius: 12px;">
                <h2 class="fw-bold mb-0" style="color: #5100FF;">{{ jogosDisponiveis().length }}</h2>
                <small class="text-muted fw-medium">Jogos Confirmados</small>
            </div>
        </div>
    </div>

    <div class="row g-4">

        <div class="col-md-4 col-sm-6" *ngFor="let jogo of jogosDisponiveis()">
            <div class="card h-100 border-0 shadow-sm" style="border-radius: 12px;">

                <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
                    <span class="badge px-3 py-2" style="background-color: #5100FF; border-radius: 20px;">
                        {{ jogo.grupo }}
                    </span>
                </div>

                <div class="card-body text-center mt-2">
                    <h5 class="fw-bold mb-3" style="font-size: 18px;">
                        {{ jogo.timeMandante }} <span class="text-muted mx-2">X</span> {{ jogo.timeVisitante }}
                    </h5>

                    <div class="text-muted fw-medium" style="font-size: 14px;">
                        Data: {{ jogo.dataHora | date:'dd/MM/yyyy - HH:mm' }}
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
